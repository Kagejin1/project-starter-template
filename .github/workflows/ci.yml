name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  java-maven:
    name: Java Maven
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Java Maven project
        id: detect
        run: |
          if [ -f "pom.xml" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        if: ${{ steps.detect.outputs.run == 'true' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Test
        if: ${{ steps.detect.outputs.run == 'true' }}
        run: |
          if [ -f "./mvnw" ]; then
            chmod +x mvnw
            ./mvnw -B test
          else
            mvn -B test
          fi

      - name: Static analysis (PMD)
        if: ${{ steps.detect.outputs.run == 'true' }}
        run: |
          if [ -f "./mvnw" ]; then
            chmod +x mvnw
            ./mvnw -B -DskipTests pmd:check
          else
            mvn -B -DskipTests pmd:check
          fi

      - name: Package
        if: ${{ steps.detect.outputs.run == 'true' }}
        run: |
          if [ -f "./mvnw" ]; then
            chmod +x mvnw
            ./mvnw -B -DskipTests package
          else
            mvn -B -DskipTests package
          fi

      - name: Upload JAR artifact
        if: ${{ steps.detect.outputs.run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: java-artifact
          path: target/*.jar
          if-no-files-found: ignore

  node:
    name: Node.js
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Node project
        id: detect
        run: |
          if [ -f "package.json" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: ${{ steps.detect.outputs.run == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        if: ${{ steps.detect.outputs.run == 'true' }}
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Lint
        if: ${{ steps.detect.outputs.run == 'true' }}
        run: npm run lint --if-present

      - name: Test
        if: ${{ steps.detect.outputs.run == 'true' }}
        run: npm test --if-present

      - name: Build
        if: ${{ steps.detect.outputs.run == 'true' }}
        run: npm run build --if-present

  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Python project
        id: detect
        run: |
          if [ -f "pyproject.toml" ] || [ -f "requirements.txt" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: ${{ steps.detect.outputs.run == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: ${{ steps.detect.outputs.run == 'true' }}
        run: |
          python -m pip install --upgrade pip
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi
          if [ -f "pyproject.toml" ]; then pip install .; fi
          pip install pytest ruff

      - name: Lint
        if: ${{ steps.detect.outputs.run == 'true' }}
        run: ruff check .

      - name: Test
        if: ${{ steps.detect.outputs.run == 'true' }}
        run: |
          if [ -d "tests" ]; then
            pytest -q
          else
            echo "No tests/ directory found. Skipping pytest."
          fi

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Dockerfile
        id: detect
        run: |
          if [ -f "Dockerfile" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Docker image
        if: ${{ steps.detect.outputs.run == 'true' }}
        run: docker build --tag project-template-ci .
